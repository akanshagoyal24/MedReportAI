<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedCare Report Analyzer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        tailwind.config = { 
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        medical: { 50: '#f0fdfa', 500: '#14b8a6', 600: '#0d9488', 900: '#134e4a' }
                    }
                }
            }
        };
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    </script>
</head>
<body class="bg-slate-50 dark:bg-slate-900 transition-colors duration-200 min-h-screen">
    <div id="app" class="max-w-6xl mx-auto p-6">
        <header class="flex justify-between items-center mb-8 border-b pb-4 border-slate-200 dark:border-slate-700">
            <h1 class="text-3xl font-extrabold text-medical-900 dark:text-teal-400 tracking-tight">MedCare</h1>
            <button onclick="document.documentElement.classList.toggle('dark')" class="px-4 py-2 rounded-lg bg-slate-200 dark:bg-slate-700 text-slate-800 dark:text-white hover:bg-slate-300 transition">Theme</button>
        </header>

        <section class="bg-white dark:bg-slate-800 p-6 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-700 mb-6">
            <div class="flex flex-col md:flex-row justify-between items-center gap-4">
                <div class="w-full">
                    <h2 class="text-xl font-semibold text-slate-700 dark:text-slate-200">Report Upload</h2>
                    <p class="text-slate-500 text-sm">Select PDF, text, or JSON reports for analysis.</p>
                </div>
                <div class="flex w-full md:w-auto items-center gap-2">
                    <input type="password" id="apiKey" placeholder="API Key" class="w-full md:w-48 p-2 rounded-lg border border-slate-300 dark:bg-slate-700 dark:border-slate-600 dark:text-white">
                    <button onclick="connectAPI()" class="px-4 py-2 bg-medical-600 text-white rounded-lg hover:bg-medical-500 transition shadow-md">Connect</button>
                </div>
            </div>
            <input type="file" id="fileInput" multiple accept=".json,.txt,.pdf" class="mt-6 block w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-medical-50 file:text-medical-700 hover:file:bg-medical-100 cursor-pointer">
            <div id="apiStatus" class="mt-3 font-medium text-sm hidden"></div>
        </section>

        <div id="reportContainer" class="hidden">
            <div class="flex border-b border-slate-200 dark:border-slate-700 overflow-x-auto">
                <button onclick="showTab('summary')" class="tab-btn px-6 py-3 border-b-2 border-medical-600 text-medical-700 dark:text-teal-400 font-medium" data-tab="summary">Summary</button>
                <button onclick="showTab('positive')" class="tab-btn px-6 py-3 text-slate-600 dark:text-slate-400 font-medium" data-tab="positive">Positives</button>
                <button onclick="showTab('negative')" class="tab-btn px-6 py-3 text-slate-600 dark:text-slate-400 font-medium" data-tab="negative">Negatives</button>
                <button onclick="showTab('graph')" class="tab-btn px-6 py-3 text-slate-600 dark:text-slate-400 font-medium" data-tab="graph">Vitals Graph</button>
            </div>
            <div id="tabContent" class="p-8 bg-white dark:bg-slate-800 rounded-b-2xl shadow-sm min-h-[300px] border-x border-b border-slate-100 dark:border-slate-700 dark:text-slate-300">
                <p id="placeholder">Upload files to begin analysis...</p>
            </div>
        </div>
    </div>

    <script>
        let reportData = { summary: "", positive: "", negative: "", vitals: [] };
        let apiKey = "";

        async function connectAPI() {
            apiKey = document.getElementById('apiKey').value;
            const status = document.getElementById('apiStatus');
            status.classList.remove('hidden', 'text-red-600');
            status.classList.add('text-medical-600');
            status.textContent = "API Configured successfully.";
        }

        async function parseFile(file) {
            if (file.type === 'application/pdf') {
                const pdf = await pdfjsLib.getDocument({data: await file.arrayBuffer()}).promise;
                let text = "";
                for (let i = 1; i <= pdf.numPages; i++) {
                    const content = await (await pdf.getPage(i)).getTextContent();
                    text += content.items.map(s => s.str).join(" ");
                }
                return text;
            }
            return await file.text();
        }

        async function handleFileUpload(e) {
            if (!apiKey) { alert("Please set your API key first!"); return; }
            const files = Array.from(e.target.files);
            const fullText = (await Promise.all(files.map(parseFile))).join("\n");
            
            document.getElementById('reportContainer').classList.remove('hidden');
            document.getElementById('tabContent').innerHTML = "<div class='flex items-center justify-center h-64 text-medical-600'>Analyzing medical reports...</div>";

            try {
                const prompt = `Act as a specialist doctor. Analyze this report. Provide JSON: {
                    "summary": "<ul><li>[Bullet point of critical finding - max 2-3 lines total]</li></ul>", 
                    "positive": "<ul><li>[Short, child-friendly explanation of only the most important healthy finding]</li>...</ul>", 
                    "negative": "<ul><li>[Short, child-friendly explanation of only the most important abnormal finding]</li>...</ul>", 
                    "vitals": [{"name": "Name", "actual": 120, "min": 90, "max": 140}, ...]
                }. Report: ${fullText}`;

                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });

                const data = await response.json();
                
                if (data && data.candidates && data.candidates[0] && data.candidates[0].content && data.candidates[0].content.parts) {
                    const textContent = data.candidates[0].content.parts[0].text;
                    reportData = JSON.parse(textContent.replace(/```json|```/g, ''));
                    showTab('summary');
                } else {
                    throw new Error(data.error ? data.error.message : "Invalid response structure.");
                }
            } catch (e) {
                document.getElementById('tabContent').innerHTML = "<div class='text-red-500'>Error analyzing report: " + e.message + "</div>";
            }
        }

        function showTab(tab) {
            const contentDiv = document.getElementById('tabContent');
            document.querySelectorAll('.tab-btn').forEach(b => {
                b.classList.remove('border-b-2', 'border-medical-600', 'text-medical-700', 'dark:text-teal-400');
                b.classList.add('text-slate-600', 'dark:text-slate-400');
                if (b.getAttribute('data-tab') === tab) {
                    b.classList.add('border-b-2', 'border-medical-600', 'text-medical-700', 'dark:text-teal-400');
                    b.classList.remove('text-slate-600', 'dark:text-slate-400');
                }
            });

            if (tab === 'graph') {
                contentDiv.innerHTML = '<canvas id="vitalChart" style="max-height: 400px; width: 100%;"></canvas>';
                const ctx = document.getElementById('vitalChart').getContext('2d');
                const labels = reportData.vitals.map(v => v.name);
                const colors = reportData.vitals.map(v => (v.actual >= v.min && v.actual <= v.max) ? '#14b8a6' : '#f43f5e');
                
                new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: labels,
                        datasets: [{ 
                            label: 'Actual Value', 
                            data: reportData.vitals.map(v => v.actual), 
                            backgroundColor: colors,
                            borderRadius: 6
                        }]
                    },
                    options: { 
                        indexAxis: 'y', 
                        responsive: true,
                        scales: { 
                            x: { beginAtZero: true, grid: { color: '#e2e8f0' } },
                            y: { grid: { display: false } }
                        },
                        plugins: { 
                            legend: { display: false },
                            tooltip: {
                                callbacks: {
                                    label: function(context) {
                                        const v = reportData.vitals[context.dataIndex];
                                        return `Actual: ${v.actual} | Expected: ${v.min}-${v.max}`;
                                    }
                                }
                            }
                        }
                    }
                });
            } else {
                contentDiv.innerHTML = reportData[tab] || "No data.";
            }
        }

        document.getElementById('fileInput').addEventListener('change', handleFileUpload);
    </script>
</body>
</html>
